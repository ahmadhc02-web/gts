name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Code
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. GitHub folder se bahar nikal jayein
          cd ..
          
          # 2. Hugging Face repo ko bilkul alag jagah clone karein
          git clone https://mahmad995:$HF_TOKEN@huggingface.co/spaces/mahmad995/my-wifi-app hf_repo
          
          # 3. HF repo ke andar jayein aur .git folder ko chhor kar sab delete kar dein
          cd hf_repo
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          
          # 4. GitHub wala code yahan copy karein (ab path sahi hai)
          cp -r ../my-wifi-app/* .
          
          # 5. Fuzool binary files remove karein
          rm -f *.tgz
          
          # 6. Push kar dein
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Auto-sync from GitHub"
          git push --force
