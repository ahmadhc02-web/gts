name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # Jab aap main branch par push karenge tab chalega

  # Isse aap GitHub par manual button daba kar bhi sync kar sakte hain
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://mahmad995:$HF_TOKEN@huggingface.co/spaces/mahmad995/my-wifi-app main
