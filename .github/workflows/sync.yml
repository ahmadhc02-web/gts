name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Code
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Hugging Face repo ko ek alag folder mein clone karein
          git clone https://mahmad995:$HF_TOKEN@huggingface.co/spaces/mahmad995/my-wifi-app hf_repo
          
          # 2. .git folder ko safe rakhein, baki sab delete kar dein
          cd hf_repo
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          
          # 3. GitHub ka sara code (jo action ne checkout kiya tha) wahan copy karein
          # $GITHUB_WORKSPACE mein hamara GitHub wala code hai
          cp -r $GITHUB_WORKSPACE/* .
          
          # 4. Binary/Fuzool files wapis remove karein
          rm -f *.tgz
          
          # 5. Push kar dein
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Auto-sync from GitHub"
          git push --force
