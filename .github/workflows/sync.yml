name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push Clean Code to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Purani saari fuzool binary files ko remove karein
          rm -f *.tgz || true
          
          # 2. Git setup configure karein
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 3. Ek temporary naya saaf suthra git setup banayein
          cd ..
          mkdir fresh_sync
          cp -r my-wifi-app/* fresh_sync/ 2>/dev/null || cp -r * fresh_sync/ 2>/dev/null || true
          cd fresh_sync
          
          # Fuzool files mita dein
          rm -f *.tgz || true
          rm -rf .git
          
          # ==========================================
          # SMART CONFIG PROTECTION (YAHAN NAYA JADOO HAI)
          # ==========================================
          # Hugging Face par maujood sahi files ko direct download karke replace kar rahay hain
          # Is se aapka push un sahi settings (port, allowedHosts, configuration) ko overwrite nahi karega
          curl -H "Authorization: Bearer $HF_TOKEN" -s https://huggingface.co/api/spaces/mahmad995/my-wifi-app/raw/main/README.md -o README.md || true
          curl -H "Authorization: Bearer $HF_TOKEN" -s https://huggingface.co/api/spaces/mahmad995/my-wifi-app/raw/main/Dockerfile -o Dockerfile || true
          curl -H "Authorization: Bearer $HF_TOKEN" -s https://huggingface.co/api/spaces/mahmad995/my-wifi-app/raw/main/vite.config.ts -o vite.config.ts || true
          curl -H "Authorization: Bearer $HF_TOKEN" -s https://huggingface.co/api/spaces/mahmad995/my-wifi-app/raw/main/vite.config.js -o vite.config.js || true
          # ==========================================

          # Naya git initialize karein
          git init
          git add .
          git commit -m "Fresh clean deployment keeping HF configurations intact"
          
          # 4. Hugging face par bina kisi history issue ke force push kar dein
          git remote add hf https://mahmad995:$HF_TOKEN@huggingface.co/spaces/mahmad995/my-wifi-app
          git push --force hf master:main || git push --force hf main
