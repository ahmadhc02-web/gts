name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push Clean Code to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Purani saari fuzool binary files ko remove karein
          rm -f *.tgz || true
          
          # 2. Git setup configure karein
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 3. Ek temporary naya saaf suthra git setup banayein
          cd ..
          mkdir fresh_sync
          cp -r my-wifi-app/* fresh_sync/ 2>/dev/null || cp -r * fresh_sync/ 2>/dev/null || true
          cd fresh_sync
          
          # Fuzool files mita dein
          rm -f *.tgz || true
          rm -rf .git
          
          # ==========================================
          # SMART CONFIG PROTECTION WITH FALLBACK
          # ==========================================
          # Pehle Hugging Face se download karne ki koshish karein
          curl -H "Authorization: Bearer $HF_TOKEN" -s https://huggingface.co/api/spaces/mahmad995/my-wifi-app/raw/main/README.md -o README.md || true
          curl -H "Authorization: Bearer $HF_TOKEN" -s https://huggingface.co/api/spaces/mahmad995/my-wifi-app/raw/main/Dockerfile -o Dockerfile || true
          curl -H "Authorization: Bearer $HF_TOKEN" -s https://huggingface.co/api/spaces/mahmad995/my-wifi-app/raw/main/vite.config.ts -o vite.config.ts || true

          # FALLBACK JADOO: Agar Hugging Face se files khali milein (404/error), to khud master config inject karein
          if [ ! -s README.md ] || grep -q "Not Found" README.md; then
            echo -e "---\ntitle: My Wifi App\nemoji: 🌐\ncolorFrom: green\ncolorTo: blue\nsdk: docker\napp_port: 3000\npinned: false\n---\n" > README.md
          fi

          if [ ! -s Dockerfile ] || grep -q "Not Found" Dockerfile; then
            echo -e "FROM node:22\nWORKDIR /usr/src/app\nCOPY package*.json ./\nRUN npm install\nCOPY . .\nRUN npm run build\nEXPOSE 3000\nENV PORT=3000\nENV HOST=0.0.0.0\nCMD [ \"npm\", \"start\" ]" > Dockerfile
          fi

          # Vite config check - allowedHosts lock rehna chahiye
          if [ -f vite.config.ts ]; then
            sed -i "s/hmr: process.env.DISABLE_HMR !== 'true',/hmr: process.env.DISABLE_HMR !== 'true',\n      host: '0.0.0.0',\n      port: 3000,\n      allowedHosts: ['mahmad995-my-wifi-app.hf.space', '.hf.space'],/g" vite.config.ts
          elif [ -f vite.config.js ]; then
            sed -i "s/hmr: process.env.DISABLE_HMR !== 'true',/hmr: process.env.DISABLE_HMR !== 'true',\n      host: '0.0.0.0',\n      port: 3000,\n      allowedHosts: ['mahmad995-my-wifi-app.hf.space', '.hf.space'],/g" vite.config.js
          fi
          # ==========================================

          # Naya git initialize karein
          git init
          git add .
          git commit -m "Fresh clean deployment keeping HF configurations intact with safety fallback"
          
          # 4. Hugging face par bina kisi history issue ke force push kar dein
          git remote add hf https://mahmad995:$HF_TOKEN@huggingface.co/spaces/mahmad995/my-wifi-app
          git push --force hf master:main || git push --force hf main
