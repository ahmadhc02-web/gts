name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install HF CLI
        run: pip install huggingface_hub

      - name: Push to HF (Keep Configs Safe)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Fuzool file remove karein
          rm -f *.tgz || true
          
          # Hugging Face Space clone karein taaki configs safe rahen
          git clone https://mahmad995:$HF_TOKEN@huggingface.co/spaces/mahmad995/my-wifi-app hf_space
          
          # Sirf git folder aur config files ko bachana hai
          cd hf_space
          # Iska matlab hai: .git, Dockerfile, README.md, vite.config.ts ko chhor kar baki sab uda do
          find . -maxdepth 1 ! -name '.git' ! -name 'Dockerfile' ! -name 'README.md' ! -name 'vite.config.ts' ! -name 'vite.config.js' ! -name '.' -exec rm -rf {} +
          
          # GitHub ka naya code yahan copy karein
          cp -r ../* .
          rm -rf .git
          mv .git_temp .git 2>/dev/null || true
          
          # Ab push kar dein
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Auto-sync: keeping config files intact"
          git push --force
