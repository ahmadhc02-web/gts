name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Poori history le kar aayega taaki shallow wala masla na ho

      - name: Push to HF (Bypassing Large Binary Files)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git settings configure karein
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Hugging Face ko naye remote ke taur par add karein
          git remote add hf https://mahmad995:$HF_TOKEN@huggingface.co/spaces/mahmad995/my-wifi-app
          
          # CRITICAL STEP: Git ko bolen ke push karte waqt agar .tgz file mile to use push na kare
          # Yeh sirf aapka fresh text code aur suthri files hi aage bhejega
          git rm --cached -r *.tgz || true
          
          # Ab force push karein bina kisi error ke
          git push --force hf main
