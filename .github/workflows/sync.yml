name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Code
        uses: actions/checkout@v3

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Hugging Face repo ko home directory mein clone karein
          git clone https://mahmad995:$HF_TOKEN@huggingface.co/spaces/mahmad995/my-wifi-app ~/hf_repo
          
          # 2. HF repo ko saaf karein (git folder ko bachate hue)
          cd ~/hf_repo
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          
          # 3. GitHub ka code (jo current directory mein hai) HF repo mein copy karein
          cp -r $GITHUB_WORKSPACE/* .
          
          # 4. Fuzool files mita dein
          rm -f *.tgz || true
          
          # 5. Push kar dein
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Auto-sync from GitHub"
          git push --force
