name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push Clean Code to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Purani saari fuzool binary files ko agar workflow runner mein hain to remove karein
          rm -f *.tgz || true
          
          # 2. Git setup configure karein
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 3. YAHAN ASLI JADOO HAI: Ek temporary naya saaf suthra git setup banayein jismein koi purani kharab history na ho
          cd ..
          mkdir fresh_sync
          cp -r my-wifi-app/* fresh_sync/ 2>/dev/null || cp -r * fresh_sync/ 2>/dev/null || true
          cd fresh_sync
          
          # Fuzool ya barhi files ko naye setup se delete rakhein
          rm -f *.tgz || true
          rm -rf .git
          
          # Naya git initialize karein (is se purani kharab history bilkul khatam)
          git init
          git add .
          git commit -m "Fresh clean deployment without binaries"
          
          # 4. Hugging face par bina kisi history issue ke force push kar dein
          git remote add hf https://mahmad995:$HF_TOKEN@huggingface.co/spaces/mahmad995/my-wifi-app
          git push --force hf master:main || git push --force hf main
